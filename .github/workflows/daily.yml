name: Daily Health Check (All Sites)

on:
  schedule:
    # 1 AM UTC = 2 AM CET (off-peak Belgium)
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      site:
        description: 'Specific site (uk, de, fr, or empty for all)'
        required: false
        default: ''

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run daily health check
        run: |
          SITE_ARG=""
          if [ -n "${{ github.event.inputs.site }}" ]; then
            SITE_ARG="--site=${{ github.event.inputs.site }}"
          fi
          npx tsx src/index.ts --mode=daily $SITE_ARG
        env:
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: reports/
          retention-days: 30
